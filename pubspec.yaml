name: barq
description: "برق - Delivery platform for stores and drivers"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_bloc: ^8.1.6
  bloc: ^8.1.4
  equatable: ^2.0.5

  # Dependency Injection
  get_it: ^7.7.0
  injectable: ^2.4.4

  # Functional Programming
  dartz: ^0.10.1

  # Networking
  dio: ^5.4.3
  pretty_dio_logger: ^1.4.0

  # Local Storage
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.2.2

  # Routing
  go_router: ^14.2.0

  # Localization
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

  # Firebase
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.4
  firebase_messaging: ^15.2.4

  # Google Maps
  google_maps_flutter: ^2.10.0
  geolocator: ^13.0.2
  geocoding: ^3.0.0

  # UI
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  google_fonts: ^6.2.1
  pin_code_fields: ^8.0.1
  image_picker: ^1.0.7
  url_launcher: ^6.2.5

  # HTTP
  http: ^1.2.1

  # Connectivity
  connectivity_plus: ^6.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code Generation
  build_runner: ^2.4.11
  injectable_generator: ^2.6.1

  # Testing
  bloc_test: ^9.1.7
  mockito: ^5.4.4
  mocktail: ^1.0.4

flutter:
  generate: true
  uses-material-design: true
